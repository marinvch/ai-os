name: "AI OS Validate"

on:
  pull_request:
    branches: [dev]
    paths:
      - "src/**"
      - "scripts/**"
      - "docs/mcp-tools.md"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/**"
  push:
    branches: [dev, master]
    paths:
      - "src/**"
      - "scripts/**"
      - "docs/mcp-tools.md"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ai-os-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-fast:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fast ops validation (build + unit tests + scorecard freshness)
        run: npm run validate:ops

      - name: Smoke validation (feature health checks)
        run: npm run validate:smoke

      - name: Audit dependencies (high severity)
        run: npm audit --omit=dev --audit-level=high

      - name: MCP docs freshness check
        run: |
          npm run gen-mcp-docs
          git diff --exit-code docs/mcp-tools.md || (echo "docs/mcp-tools.md is stale — run npm run gen-mcp-docs and commit" && exit 1)

  test-matrix:
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ["20", "22"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test

  validate-full:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Full validation (build + unit tests + regression)
        run: npm run validate:full

      - name: Smoke validation (feature health checks)
        run: npm run validate:smoke

      - name: Audit dependencies (high severity)
        run: npm audit --omit=dev --audit-level=high

      - name: MCP docs freshness check
        run: |
          npm run gen-mcp-docs
          git diff --exit-code docs/mcp-tools.md || (echo "docs/mcp-tools.md is stale — run npm run gen-mcp-docs and commit" && exit 1)

      - name: Scorecard regression check
        run: npm run scorecard:check

  self-scorecard:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run ai-os against itself (dry-run)
        run: node dist/generate.js --dry-run

      - name: Scorecard check (self-hosted regression gate)
        run: npm run scorecard:check
