name: Automated Release

on:
  push:
    branches: [master]
  workflow_run:
    workflows: ["AI OS Validate"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  noop-on-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Skip direct push release
        run: echo "Release is gated by AI OS Validate workflow_run; push event is a no-op."

  release:
    # Only release when: manual dispatch OR validate succeeded AND ran on the master branch
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Determine release plan
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          TARGET_SHA="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

          # Read version from package.json — this is the source of truth.
          PKG_VERSION=$(node -p "require('./package.json').version")
          NEXT_TAG="v${PKG_VERSION}"
          echo "next_tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"

          # If this tag already exists, nothing to release.
          if git rev-parse "$NEXT_TAG" >/dev/null 2>&1; then
            echo "Tag $NEXT_TAG already exists — no release needed."
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"

          RANGE="$LAST_TAG..$TARGET_SHA"
          COMMITS=$(git rev-list --count "$RANGE" 2>/dev/null || echo "0")
          echo "commit_count=$COMMITS" >> "$GITHUB_OUTPUT"

          echo "release_needed=true" >> "$GITHUB_OUTPUT"

      - name: Show plan
        run: |
          echo "Release plan"
          echo "Target SHA: ${{ steps.plan.outputs.target_sha }}"
          echo "Last tag: ${{ steps.plan.outputs.last_tag }}"
          echo "Commits since last tag: ${{ steps.plan.outputs.commit_count }}"
          echo "Next tag: ${{ steps.plan.outputs.next_tag }}"
          echo "Release needed: ${{ steps.plan.outputs.release_needed }}"

      - name: Create tag and GitHub release
        if: steps.plan.outputs.release_needed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          NEXT_TAG="${{ steps.plan.outputs.next_tag }}"
          TARGET_SHA="${{ steps.plan.outputs.target_sha }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$NEXT_TAG" >/dev/null 2>&1; then
            echo "Tag $NEXT_TAG already exists. Skipping release."
            exit 0
          fi

          git tag -a "$NEXT_TAG" "$TARGET_SHA" -m "Release $NEXT_TAG"
          git push origin "$NEXT_TAG"

          NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes -f tag_name="$NEXT_TAG" -f target_commitish="$TARGET_SHA" --jq .body)
          COMMITS=$(git log --format='- %h %s' "${{ steps.plan.outputs.last_tag }}..$TARGET_SHA")

          RELEASE_NOTES_FILE=$(mktemp)
          {
            echo "$NOTES"
            echo
            echo "---"
            echo
            echo "## Commits in this release"
            echo "$COMMITS"
          } > "$RELEASE_NOTES_FILE"

          gh release create "$NEXT_TAG" \
            --title "$NEXT_TAG" \
            --notes-file "$RELEASE_NOTES_FILE"

      - name: Bump version in package.json
        continue-on-error: true
        if: steps.plan.outputs.release_needed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          RELEASED_VERSION="${{ steps.plan.outputs.next_tag }}"
          RELEASED_VERSION="${RELEASED_VERSION#v}"

          # Compute next patch version for dev
          IFS='.' read -r MAJOR MINOR PATCH <<< "$RELEASED_VERSION"
          PATCH=$((PATCH + 1))
          NEXT_DEV_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          BUMP_BRANCH="version-bump-v${NEXT_DEV_VERSION}"

          git checkout master
          git pull origin master

          # Respect branch protections: commit on a dedicated branch and open a PR to dev.
          git fetch origin dev
          git checkout -B "$BUMP_BRANCH" origin/dev

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${NEXT_DEV_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          if git diff --quiet package.json; then
            echo "package.json already at ${NEXT_DEV_VERSION} — no commit needed."
            exit 0
          fi

          git add package.json
          git commit -m "chore: bump version to v${NEXT_DEV_VERSION} [skip ci]"
          git push -u origin "$BUMP_BRANCH"

          # Create PR only if one does not already exist for this head branch.
          EXISTING_PR=$(gh pr list \
            --base dev \
            --head "$BUMP_BRANCH" \
            --json number \
            --jq '.[0].number // empty')

          if [[ -n "$EXISTING_PR" ]]; then
            echo "Version bump PR already exists: #$EXISTING_PR"
            exit 0
          fi

          gh pr create \
            --base dev \
            --head "$BUMP_BRANCH" \
            --title "chore: bump version to v${NEXT_DEV_VERSION}" \
            --body "Automated version bump after release ${{ steps.plan.outputs.next_tag }}.\n\nThis PR updates package.json on dev to the next patch version for future development." \
            --label automation

      - name: No release needed
        if: steps.plan.outputs.release_needed != 'true'
        run: echo "No releasable changes detected; skipping release."

