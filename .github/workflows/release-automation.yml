name: Automated Release

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release plan
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"

          RANGE="$LAST_TAG..HEAD"
          COMMITS=$(git rev-list --count "$RANGE" 2>/dev/null || echo "0")
          echo "commit_count=$COMMITS" >> "$GITHUB_OUTPUT"

          if [[ "$COMMITS" == "0" ]]; then
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LOG=$(git log --format=%B "$RANGE")
          BUMP="patch"
          if echo "$LOG" | grep -Eq "BREAKING CHANGE|^[a-zA-Z]+\(!\):"; then
            BUMP="major"
          elif echo "$LOG" | grep -Eq "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

          LAST_VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor)
              MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch)
              PATCH=$((PATCH + 1)) ;;
          esac

          NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "next_tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"
          echo "release_needed=true" >> "$GITHUB_OUTPUT"

      - name: Dry run (PR validation)
        if: github.event_name == 'pull_request'
        run: |
          echo "Release dry run"
          echo "Last tag: ${{ steps.plan.outputs.last_tag }}"
          echo "Commits since last tag: ${{ steps.plan.outputs.commit_count }}"
          echo "Bump: ${{ steps.plan.outputs.bump }}"
          echo "Next tag: ${{ steps.plan.outputs.next_tag }}"
          if [[ "${{ steps.plan.outputs.release_needed }}" != "true" ]]; then
            echo "No releasable changes detected."
          fi

      - name: Create tag and GitHub release
        if: github.event_name == 'push' && steps.plan.outputs.release_needed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          NEXT_TAG="${{ steps.plan.outputs.next_tag }}"

          if git rev-parse "$NEXT_TAG" >/dev/null 2>&1; then
            echo "Tag $NEXT_TAG already exists. Skipping release."
            exit 0
          fi

          git tag -a "$NEXT_TAG" -m "Release $NEXT_TAG"
          git push origin "$NEXT_TAG"

          NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes -f tag_name="$NEXT_TAG" -f target_commitish="${{ github.sha }}" --jq .body)
          COMMITS=$(git log --format='- %h %s' "${{ steps.plan.outputs.last_tag }}..HEAD")

          gh release create "$NEXT_TAG" \
            --title "$NEXT_TAG" \
            --notes "$NOTES

---

## Commits in this release
$COMMITS"

      - name: No release needed
        if: github.event_name == 'push' && steps.plan.outputs.release_needed != 'true'
        run: echo "No releasable changes detected; skipping release."
