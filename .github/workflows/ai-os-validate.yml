name: "AI OS Validate"

on:
  pull_request:
    branches: [dev]
    paths:
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/**"
  push:
    branches: [dev, master]
    paths:
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ai-os-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-fast:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fast ops validation (build + unit tests + scorecard freshness)
        run: npm run validate:ops

      - name: Smoke validation (feature health checks)
        run: npm run validate:smoke

  validate-full:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Full validation (build + unit tests + regression)
        run: npm run validate:full

      - name: Smoke validation (feature health checks)
        run: npm run validate:smoke

      - name: Scorecard regression check
        run: npm run scorecard:check

  self-scorecard:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run ai-os against itself (dry-run)
        run: node dist/generate.js --dry-run

      - name: Scorecard check (self-hosted regression gate)
        run: npm run scorecard:check
